<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YarBank Ultra Aero v8</title>
    <style>
        :root {
            --bg: #030305;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2ff;
            --purple: #bc47ff;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --grad: linear-gradient(135deg, var(--cyan), var(--purple));
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .orb { position: fixed; width: 300px; height: 300px; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.15; animation: float 10s infinite alternate; }
        .orb-1 { background: var(--cyan); top: -100px; left: -100px; }
        .orb-2 { background: var(--purple); bottom: -100px; right: -100px; animation-delay: -5s; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(40px, 60px); } }

        /* ВХОД */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .login-card { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 40px; padding: 30px; width: 90%; max-width: 340px; text-align: center; }
        .pin-dots { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--text-dim); transition: 0.3s; }
        .dot.active { background: var(--cyan); box-shadow: 0 0 15px var(--cyan); transform: scale(1.2); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { background: var(--glass); border: 1px solid var(--border); border-radius: 18px; height: 60px; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .key:active { background: var(--grad); color: #000; transform: scale(0.95); }

        /* ПРИЛОЖЕНИЕ */
        #app-content { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: 0.5s; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-scroll { flex: 1; overflow-y: auto; padding: 0 20px 100px 20px; scrollbar-width: none; }
        
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 20px; }
        .balance-val { font-size: 36px; font-weight: 700; margin: 5px 0; letter-spacing: -1px; }

        /* КНОПКИ ДЕЙСТВИЙ */
        .actions { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-act { 
            flex: 1; padding: 15px; border-radius: 18px; border: 1px solid var(--border); 
            background: var(--glass); color: #fff; font-weight: 600; font-size: 11px; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-act.primary { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .btn-act.secondary { border-color: var(--purple); color: var(--purple); box-shadow: 0 0 15px rgba(188, 71, 255, 0.1); }
        .btn-act:active { transform: scale(0.95); opacity: 0.7; }

        .h-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .h-scroll::-webkit-scrollbar { display: none; }
        .item-circle { flex: 0 0 65px; text-align: center; cursor: pointer; }
        .avatar { width: 55px; height: 55px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 5px; }

        .hist-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        input { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 15px; color: #fff; margin-bottom: 10px; font-size: 16px; }
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; background: var(--grad); border: none; font-weight: bold; cursor: pointer; color: #000; font-size: 16px; }

        .tab-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; }
        .tab-item { opacity: 0.4; font-size: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .tab-item.active { opacity: 1; color: var(--cyan); }
        
        .page-section { display: none; animation: slideUp 0.4s ease; }
        .page-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin:0; font-weight: 200; letter-spacing: 3px;">YAR<span style="color:var(--cyan); font-weight: 700;">BANK</span></h1>
            <div class="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="numpad">
                <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
                <div class="key" style="opacity:0"></div><div class="key" onclick="pressKey('0')">0</div><div class="key" onclick="pressKey('back')">✕</div>
            </div>
        </div>
    </div>

    <div id="app-content">
        <header>
            <div>
                <div id="header-date" style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;"></div>
                <div id="page-title" style="font-weight: 700; font-size: 20px; letter-spacing: -0.5px;">Главная</div>
            </div>
            <div style="width:40px; height:40px; border-radius:12px; background: var(--grad); display:flex; align-items:center; justify-content:center; color: #000; font-weight: bold;">ЯР</div>
        </header>

        <div class="main-scroll">
            <div id="page-home" class="page-section active">
                <div class="card">
                    <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">ТЕКУЩИЙ БАЛАНС</div>
                    <div class="balance-val" id="balance">0 ₸</div>
                    <div id="daily-fact" style="font-size: 11px; color: var(--cyan); margin-top: 10px; opacity: 0.8;"></div>
                </div>

                <div class="actions">
                    <button class="btn-act primary" onclick="topUp()">📥 Пополнить</button>
                    <button class="btn-act secondary" onclick="nav('credit', document.getElementById('tab-c'), 'Кредиты')">💸 Кредит</button>
                </div>

                <h2 style="font-size: 12px; color: var(--text-dim); margin: 25px 0 12px; letter-spacing: 1px;">ОТДЕЛЫ КОРПОРАЦИИ</h2>
                <div class="h-scroll" id="scroll-depts"><div style="font-size: 11px; opacity: 0.2; padding: 10px;">Список пуст</div></div>

                <h2 style="font-size: 12px; color: var(--text-dim); margin: 25px 0 12px; letter-spacing: 1px;">КОНТАКТЫ</h2>
                <div class="h-scroll" id="scroll-contacts"><div style="font-size: 11px; opacity: 0.2; padding: 10px;">Список пуст</div></div>

                <div class="card" style="margin-top: 30px;">
                    <div style="font-size: 12px; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px;">ИСТОРИЯ ОПЕРАЦИЙ</div>
                    <div id="hist-list" style="font-size: 13px; color: var(--text-dim); text-align: center; padding: 20px 0;">Операций еще не было</div>
                </div>
            </div>

            <div id="page-credit" class="page-section">
                <div class="card">
                    <h2 style="margin-top:0; font-size: 18px;">Заявка на кредит</h2>
                    <input type="text" id="c-name" placeholder="Назначение кредита">
                    <input type="number" id="c-amt" placeholder="Сумма ₸">
                    <button class="btn-main" onclick="applyCredit()">ПОЛУЧИТЬ СРЕДСТВА</button>
                </div>
            </div>

            <div id="page-settings" class="page-section">
                <div class="card">
                    <h2 style="margin-top:0; font-size: 18px;">Добавить на главную</h2>
                    <select id="add-type" style="width:100%; padding:15px; background: #000; color:#fff; border:1px solid var(--border); border-radius:15px; margin-bottom:10px;">
                        <option value="contact">Личный контакт</option>
                        <option value="dept">Отдел/Офис</option>
                    </select>
                    <input type="text" id="new-name" placeholder="Введите имя или название">
                    <button class="btn-main" onclick="addItem()">ДОБАВИТЬ В СПИСОК</button>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="nav('home', this, 'Главная')"><span>🏠</span><br>ГЛАВНАЯ</div>
            <div id="tab-c" class="tab-item" onclick="nav('credit', this, 'Кредиты')"><span>💸</span><br>КРЕДИТЫ</div>
            <div class="tab-item" onclick="nav('settings', this, 'Настройки')"><span>⚙️</span><br>УПРАВЛЕНИЕ</div>
        </nav>
    </div>

    <script>
        const PINS = ["2026", "2807", "2907", "3008"];
        let currentPin = "";
        let balance = 0;

        document.getElementById('header-date').innerText = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
        const FACTS = ["Система YarBank v8.0 запущена.", "Безопасность подтверждена.", "Все системы работают стабильно."];
        document.getElementById('daily-fact').innerText = "● " + FACTS[Math.floor(Math.random()*FACTS.length)];

        function pressKey(key) {
            if (key === 'back') currentPin = currentPin.slice(0, -1);
            else if (currentPin.length < 4) currentPin += key;
            
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i < currentPin.length));

            if (currentPin.length === 4) {
                if (PINS.includes(currentPin)) {
                    const screen = document.getElementById('login-screen');
                    screen.style.opacity = '0';
                    screen.style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        screen.style.display = 'none';
                        document.getElementById('app-content').style.display = 'flex';
                        setTimeout(() => document.getElementById('app-content').style.opacity = '1', 50);
                    }, 500);
                } else {
                    currentPin = "";
                    setTimeout(() => dots.forEach(d => d.classList.remove('active')), 200);
                }
            }
        }

        function nav(id, el, title) {
            document.querySelectorAll('.page-section, .tab-item').forEach(x => x.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('page-title').innerText = title;
            el.classList.add('active');
        }

        function updateUI(amt, desc, isPos) {
            balance += isPos ? amt : -amt;
            document.getElementById('balance').innerText = balance.toLocaleString() + " ₸";
            const hist = document.getElementById('hist-list');
            if(hist.innerText.includes("еще не было")) hist.innerHTML = '';
            hist.insertAdjacentHTML('afterbegin', `<div class="hist-item"><span>${desc}</span><span style="color:${isPos?'#00ffaa':'#ff4a4a'}">${isPos?'+':'-'}${amt.toLocaleString()} ₸</span></div>`);
        }

        function topUp() {
            const f = prompt("Источник пополнения:");
            const a = parseInt(prompt("Сумма пополнения (₸):"));
            if(a > 0) updateUI(a, f || 'Пополнение', true);
        }

        function applyCredit() {
            const a = parseInt(document.getElementById('c-amt').value);
            const n = document.getElementById('c-name').value;
            if(a > 0) {
                updateUI(a, `Кредит: ${n || 'Целевой'}`, true);
                document.getElementById('c-amt').value = '';
                nav('home', document.querySelector('.tab-item'), 'Главная');
            }
        }

        function addItem() {
            const n = document.getElementById('new-name').value;
            const t = document.getElementById('add-type').value;
            if(!n) return;
            const container = document.getElementById(t === 'dept' ? 'scroll-depts' : 'scroll-contacts');
            if(container.innerText.includes("Пуст")) container.innerHTML = '';
            container.insertAdjacentHTML('beforeend', `<div class="item-circle" onclick="sendMoney('${n}')"><div class="avatar">${t==='dept'?'🏢':'👤'}</div><div style="font-size:10px; color:var(--text-dim);">${n}</div></div>`);
            document.getElementById('new-name').value = '';
            nav('home', document.querySelector('.tab-item'), 'Главная');
        }

        function sendMoney(t) {
            const a = parseInt(prompt(`Сумма для ${t}:`));
            if(a > balance) alert("Недостаточно средств!");
            else if(a > 0) updateUI(a, `Перевод: ${t}`, false);
        }
    </script>
</body>
</html>
