<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YarBank</title>
    <style>
        :root {
            --bg: #020204;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-heavy: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --cyan: #00f2ff;
            --purple: #bc47ff;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --grad: linear-gradient(135deg, var(--cyan), var(--purple));
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Живой фон */
        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.12; animation: float 15s infinite alternate; }
        .orb-1 { background: var(--cyan); top: -150px; left: -100px; }
        .orb-2 { background: var(--purple); bottom: -150px; right: -100px; animation-delay: -7s; }
        @keyframes float { from { transform: translate(0,0) scale(1); } to { transform: translate(60px, 40px) scale(1.1); } }

        /* ВХОД */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .login-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 40px; padding: 40px 30px; width: 90%; max-width: 340px; text-align: center; box-shadow: var(--shadow); }
        .pin-dots { display: flex; justify-content: center; gap: 18px; margin: 30px 0; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--text-dim); transition: 0.3s; }
        .dot.active { background: var(--cyan); box-shadow: 0 0 15px var(--cyan); transform: scale(1.3); border-color: var(--cyan); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .key { background: var(--glass); border: 1px solid var(--border); border-radius: 22px; height: 65px; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .key:active { background: var(--grad); color: #000; transform: scale(0.92); }

        /* ПРИЛОЖЕНИЕ */
        #app-content { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: 0.5s; }
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-scroll { flex: 1; overflow-y: auto; padding: 0 20px 120px 20px; scrollbar-width: none; }
        .main-scroll::-webkit-scrollbar { display: none; }

        .card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 32px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .balance-val { font-size: 40px; font-weight: 800; margin: 8px 0; letter-spacing: -1.5px; }

        .actions { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn-act { 
            flex: 1; padding: 18px; border-radius: 20px; border: 1px solid var(--border); 
            background: var(--glass-heavy); color: #fff; font-weight: 700; font-size: 11px; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-act.primary { border-color: var(--cyan); color: var(--cyan); }
        .btn-act.secondary { border-color: var(--purple); color: var(--purple); }
        .btn-act:active { transform: scale(0.95); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .h-scroll { display: flex; gap: 20px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .item-circle { flex: 0 0 70px; text-align: center; cursor: pointer; }
        .avatar { width: 62px; height: 62px; border-radius: 24px; background: var(--glass-heavy); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 8px; transition: 0.3s; }
        .item-circle:active .avatar { transform: translateY(-5px); border-color: var(--cyan); }

        .hist-item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; animation: fadeIn 0.4s ease; }
        
        input, select { width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; color: #fff; margin-bottom: 12px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--cyan); background: rgba(0,0,0,0.6); }
        .btn-main { width: 100%; padding: 20px; border-radius: 20px; background: var(--grad); border: none; font-weight: 800; cursor: pointer; color: #000; font-size: 16px; box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); }

        /* ТАБ-БАР */
        .tab-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; background: rgba(10,10,15,0.8); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: var(--shadow); }
        .tab-item { opacity: 0.3; font-size: 10px; text-align: center; cursor: pointer; transition: 0.4s; color: #fff; text-decoration: none; }
        .tab-item.active { opacity: 1; color: var(--cyan); transform: translateY(-2px); }
        .tab-item span { font-size: 22px; display: block; margin-bottom: 2px; }

        .page-section { display: none; animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .page-section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ПРОФИЛЬ */
        .profile-header { text-align: center; margin-bottom: 30px; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 35px; background: var(--grad); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 36px; color: #000; box-shadow: 0 15px 30px rgba(188, 71, 255, 0.3); }
    </style>
</head>
<body>

    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin:0; font-weight: 200; letter-spacing: 5px;">YAR<span style="color:var(--cyan); font-weight: 800;">BANK</span></h1>
            <div class="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="numpad">
                <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
                <div class="key" style="opacity:0"></div><div class="key" onclick="pressKey('0')">0</div><div class="key" onclick="pressKey('back')">✕</div>
            </div>
        </div>
    </div>

    <div id="app-content">
        <header>
            <div>
                <div id="header-date" style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">ПОНЕДЕЛЬНИК, 9 МАРТА</div>
                <div id="page-title" style="font-weight: 800; font-size: 24px;">Главная</div>
            </div>
            <div id="user-avatar-btn" onclick="nav('profile', document.getElementById('tab-p'), 'Профиль')" style="width:48px; height:48px; border-radius:18px; background: var(--grad); display:flex; align-items:center; justify-content:center; color: #000; font-weight: 900; cursor: pointer; box-shadow: 0 8px 15px rgba(0, 242, 255, 0.2);">ЯР</div>
        </header>

        <div class="main-scroll">
            <div id="page-home" class="page-section active">
                <div class="card" style="background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);">
                    <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1.5px;">ДОСТУПНЫЙ БАЛАНС</div>
                    <div class="balance-val" id="balance">0 ₽</div>
                    <div id="daily-fact" style="font-size: 11px; color: var(--cyan); margin-top: 12px; font-weight: 500;"></div>
                </div>

                <div class="actions">
                    <button class="btn-act primary" onclick="topUp()">📥 Пополнить</button>
                    <button class="btn-act secondary" onclick="nav('credit', document.getElementById('tab-c'), 'Кредиты')">💸 Кредит</button>
                </div>

                <h2 style="font-size: 12px; color: var(--text-dim); margin: 30px 0 15px; letter-spacing: 1.5px;">ОТДЕЛЫ</h2>
                <div class="h-scroll" id="scroll-depts"></div>

                <h2 style="font-size: 12px; color: var(--text-dim); margin: 30px 0 15px; letter-spacing: 1.5px;">КОНТАКТЫ</h2>
                <div class="h-scroll" id="scroll-contacts"></div>

                <div class="card" style="margin-top: 30px; background: rgba(0,0,0,0.2);">
                    <div style="font-size: 12px; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px;">ИСТОРИЯ ТРАНЗАКЦИЙ</div>
                    <div id="hist-list"></div>
                </div>
            </div>

            <div id="page-profile" class="page-section">
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="prof-ava-big">ЯР</div>
                        <h3 id="prof-name-display" style="margin: 0; font-size: 22px;">Ярослав</h3>
                        <p style="font-size: 12px; color: var(--text-dim);">Управление аккаунтом YarBank</p>
                    </div>
                    <div style="margin-top: 20px;">
                        <label style="font-size: 11px; color: var(--text-dim); margin-left: 10px;">ВАШЕ ИМЯ</label>
                        <input type="text" id="edit-name" placeholder="Введите имя...">
                        <button class="btn-main" onclick="saveProfile()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                    </div>
                    <button onclick="clearAllData()" style="margin-top: 30px; background: transparent; border: 1px solid rgba(255,0,0,0.3); color: #ff4a4a; width: 100%; padding: 15px; border-radius: 15px; font-size: 12px; font-weight: bold; cursor: pointer;">СБРОСИТЬ ВСЕ ДАННЫЕ</button>
                </div>
            </div>

            <div id="page-credit" class="page-section">
                <div class="card">
                    <h2 style="margin-top:0; font-size: 20px;">Новый займ</h2>
                    <input type="text" id="c-name" placeholder="На что нужны деньги?">
                    <input type="number" id="c-amt" placeholder="Сумма в рублях">
                    <button class="btn-main" onclick="applyCredit()">ПОДТВЕРДИТЬ КРЕДИТ</button>
                </div>
            </div>

            <div id="page-settings" class="page-section">
                <div class="card">
                    <h2 style="margin-top:0; font-size: 20px;">Добавить объект</h2>
                    <select id="add-type">
                        <option value="contact">Личный контакт</option>
                        <option value="dept">Отдел/Корпорация</option>
                    </select>
                    <input type="text" id="new-name" placeholder="Имя или Название">
                    <button class="btn-main" onclick="addItem()">ДОБАВИТЬ В СПИСОК</button>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="nav('home', this, 'Главная')"><span>🏠</span>ГЛАВНАЯ</div>
            <div id="tab-c" class="tab-item" onclick="nav('credit', this, 'Кредиты')"><span>💸</span>КРЕДИТЫ</div>
            <div class="tab-item" onclick="nav('settings', this, 'Добавить')"><span>➕</span>ДОБАВИТЬ</div>
            <div id="tab-p" class="tab-item" onclick="nav('profile', this, 'Профиль')"><span>👤</span>ПРОФИЛЬ</div>
        </nav>
    </div>

    <script>
        const PINS = ["2026", "2807", "2907", "3008"];
        let currentPin = "";
        
        // --- СИСТЕМА СОХРАНЕНИЯ (LOCAL STORAGE) ---
        let userData = JSON.parse(localStorage.getItem('yarbank_data')) || {
            name: "Ярослав",
            balance: 0,
            history: [],
            contacts: [],
            depts: []
        };

        function saveData() {
            localStorage.setItem('yarbank_data', JSON.stringify(userData));
            renderAll();
        }

        // --- ЛОГИКА ВХОДА ---
        function pressKey(key) {
            if (key === 'back') currentPin = currentPin.slice(0, -1);
            else if (currentPin.length < 4) currentPin += key;
            
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i < currentPin.length));

            if (currentPin.length === 4) {
                if (PINS.includes(currentPin)) {
                    document.getElementById('login-screen').style.opacity = '0';
                    document.getElementById('login-screen').style.transform = 'translateY(-100%)';
                    setTimeout(() => {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('app-content').style.display = 'flex';
                        setTimeout(() => document.getElementById('app-content').style.opacity = '1', 50);
                    }, 600);
                } else {
                    currentPin = "";
                    setTimeout(() => dots.forEach(d => d.classList.remove('active')), 200);
                }
            }
        }

        // --- НАВИГАЦИЯ ---
        function nav(id, el, title) {
            document.querySelectorAll('.page-section, .tab-item').forEach(x => x.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('page-title').innerText = title;
            if(el) el.classList.add('active');
        }

        // --- РЕНДЕРИНГ ---
        function renderAll() {
            // Баланс и Имя
            document.getElementById('balance').innerText = userData.balance.toLocaleString() + " ₽";
            const shortName = userData.name.substring(0, 2).toUpperCase();
            document.getElementById('user-avatar-btn').innerText = shortName;
            document.getElementById('prof-ava-big').innerText = shortName;
            document.getElementById('prof-name-display').innerText = userData.name;
            document.getElementById('edit-name').value = userData.name;

            // История
            const hist = document.getElementById('hist-list');
            hist.innerHTML = userData.history.length ? '' : '<div style="text-align:center; padding:20px; opacity:0.3;">Нет операций</div>';
            userData.history.forEach(item => {
                hist.insertAdjacentHTML('afterbegin', `
                    <div class="hist-item">
                        <span>${item.desc}</span>
                        <span style="color:${item.pos ? '#00ffaa' : '#ff4a4a'}">${item.pos ? '+' : '-'}${item.amt.toLocaleString()} ₽</span>
                    </div>
                `);
            });

            // Списки (Контакты и Отделы)
            const dCont = document.getElementById('scroll-depts');
            const cCont = document.getElementById('scroll-contacts');
            dCont.innerHTML = userData.depts.length ? '' : '<div style="font-size:11px; opacity:0.2;">Пусто</div>';
            cCont.innerHTML = userData.contacts.length ? '' : '<div style="font-size:11px; opacity:0.2;">Пусто</div>';

            userData.depts.forEach(d => dCont.insertAdjacentHTML('beforeend', createItemUI(d, '🏢')));
            userData.contacts.forEach(c => cCont.insertAdjacentHTML('beforeend', createItemUI(c, '👤')));
        }

        function createItemUI(name, icon) {
            return `<div class="item-circle" onclick="sendMoney('${name}')"><div class="avatar">${icon}</div><div style="font-size:10px; opacity:0.6;">${name}</div></div>`;
        }

        // --- ОПЕРАЦИИ ---
        function topUp() {
            const f = prompt("Источник пополнения:");
            const a = parseInt(prompt("Сумма (₽):"));
            if(a > 0) {
                userData.balance += a;
                userData.history.push({desc: `Входящий: ${f || 'Пополнение'}`, amt: a, pos: true});
                saveData();
            }
        }

        function applyCredit() {
            const a = parseInt(document.getElementById('c-amt').value);
            const n = document.getElementById('c-name').value;
            if(a > 0) {
                userData.balance += a;
                userData.history.push({desc: `Кредит: ${n || 'Займ'}`, amt: a, pos: true});
                document.getElementById('c-amt').value = ''; document.getElementById('c-name').value = '';
                saveData();
                nav('home', document.querySelector('.tab-item'), 'Главная');
            }
        }

        function addItem() {
            const n = document.getElementById('new-name').value;
            const t = document.getElementById('add-type').value;
            if(!n) return;
            if(t === 'dept') userData.depts.push(n);
            else userData.contacts.push(n);
            document.getElementById('new-name').value = '';
            saveData();
            nav('home', document.querySelector('.tab-item'), 'Главная');
        }

        function sendMoney(target) {
            const a = parseInt(prompt(`Перевод для ${target} (₽):`));
            if(a > userData.balance) return alert("Недостаточно средств!");
            if(a > 0) {
                userData.balance -= a;
                userData.history.push({desc: `Перевод: ${target}`, amt: a, pos: false});
                saveData();
            }
        }

        function saveProfile() {
            const newName = document.getElementById('edit-name').value;
            if(newName) {
                userData.name = newName;
                saveData();
                alert("Профиль обновлен!");
                nav('home', document.querySelector('.tab-item'), 'Главная');
            }
        }

        function clearAllData() {
            if(confirm("Вы уверены? Все деньги, контакты и история будут удалены!")) {
                localStorage.removeItem('yarbank_data');
                location.reload();
            }
        }

        // Инициализация
        document.getElementById('header-date').innerText = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
        const FACTS = ["YarBank Elite: Твои данные теперь под надежной защитой.", "Используй раздел Профиль для смены имени.", "Local Storage активен — баланс сохранен."];
        document.getElementById('daily-fact').innerText = "● " + FACTS[Math.floor(Math.random()*FACTS.length)];
        renderAll();
    </script>
</body>
</html>
