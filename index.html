<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YarBank | Neon Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0c;
            --accent: #00f2ff; 
            --text: #ffffff;
            --border: rgba(0, 242, 255, 0.2);
            --danger: #ff0055; 
            --money: #00ff88; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .brand { font-family: 'Orbitron', sans-serif; font-weight: 800; color: var(--accent); letter-spacing: 3px; font-size: 1.1rem; text-shadow: 0 0 10px var(--accent); }
        .status { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--money); }

        /* ГЛАВНАЯ КАРТОЧКА */
        .neon-card {
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            position: relative;
        }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; display: block; }
        .balance { font-family: 'Orbitron', sans-serif; font-size: 2.6rem; font-weight: 700; color: var(--money); text-shadow: 0 0 10px var(--money); }

        /* СЕКЦИИ */
        h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 15px; color: var(--accent); display: flex; align-items: center; }
        h2::before { content: '>'; margin-right: 8px; color: var(--accent); }
        section { margin-bottom: 30px; }

        /* ЛЮДИ */
        .people-grid { display: flex; gap: 12px; overflow-x: auto; padding: 5px; }
        .person-pill {
            min-width: 65px; height: 65px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.3rem;
            cursor: pointer; transition: 0.3s;
        }
        .person-pill:active { transform: scale(0.9); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* СПИСКИ */
        .neon-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
        }
        .list-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .list-row:last-child { border-bottom: none; }
        .info p { font-size: 0.85rem; font-weight: 700; }
        .info span { font-size: 0.6rem; opacity: 0.4; text-transform: uppercase; }

        /* КНОПКИ */
        .btn-mini {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .footer-tools {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .btn-neon {
            padding: 18px; border-radius: 16px; border: 2px solid var(--accent);
            font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 0.7rem; text-transform: uppercase;
            cursor: pointer; background: none; color: var(--accent);
        }
        .btn-fill { background: var(--accent); color: #000; border: none; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="brand">YARBANK</div>
        <div class="status">System Online</div>
    </header>

    <div class="neon-card">
        <span class="label">Yar Assets Score</span>
        <div class="balance" id="val-bal">0</div>
    </div>

    <section>
        <h2>Пользователи</h2>
        <div class="people-grid" id="list-users">
            <div class="person-pill" onclick="addUser()" style="border-style: dashed; opacity: 0.3;">+</div>
        </div>
    </section>

    <section>
        <h2>Корпорации</h2>
        <div class="neon-box" id="list-corps">
            <div style="padding: 20px; text-align: center; font-size: 0.7rem; opacity: 0.2;">EMPTY_DATABASE</div>
        </div>
        <button class="btn-neon" style="width: 100%; margin-top: 12px; padding: 10px; font-size: 0.6rem;" onclick="addCorp()">+ Добавить Компанию</button>
    </section>

    <section>
        <h2>Логи YarBank</h2>
        <div class="neon-box" id="list-logs">
            <div style="padding: 20px; text-align: center; font-size: 0.7rem; opacity: 0.2;">LOGS_NOT_FOUND</div>
        </div>
    </section>

    <div class="footer-tools">
        <button class="btn-neon btn-fill" onclick="deposit()">Зачислить</button>
        <button class="btn-neon" onclick="location.reload()">Сбросить</button>
    </div>

    <script>
        let score = 0;
        let users = [];
        let corps = [];
        let logs = [];

        function sync() {
            document.getElementById('val-bal').innerText = score.toLocaleString();
            const uHtml = users.map(u => `<div class="person-pill" onclick="send('${u.n}')">${u.n[0]}</div>`).join('');
            document.getElementById('list-users').innerHTML = `<div class="person-pill" onclick="addUser()" style="border-style: dashed; opacity: 0.3;">+</div>` + uHtml;

            if(corps.length > 0) {
                document.getElementById('list-corps').innerHTML = corps.map(c => `
                    <div class="list-row">
                        <div class="info"><p>${c.n}</p><span>Corp Member</span></div>
                        <button class="btn-mini" onclick="send('${c.n}')">Перевод</button>
                    </div>
                `).join('');
            }

            if(logs.length > 0) {
                document.getElementById('list-logs').innerHTML = logs.slice(-5).reverse().map(l => `
                    <div class="list-row">
                        <div class="info"><p>${l.to}</p><span>${l.type}</span></div>
                        <div style="font-family: 'Orbitron'; font-size: 0.8rem; color: ${l.v > 0 ? 'var(--money)' : 'var(--danger)'}">
                            ${l.v > 0 ? '+' : ''}${l.v}
                        </div>
                    </div>
                `).join('');
            }
        }

        function deposit() {
            let a = prompt("Количество единиц:");
            if(a && !isNaN(a)) {
                score += parseInt(a);
                logs.push({to: 'YAR_INCOME', type: 'ЗАЧИСЛЕНИЕ', v: parseInt(a)});
                sync();
            }
        }

        function addUser() {
            let n = prompt("Имя пользователя:");
            if(n) { users.push({n}); sync(); }
        }

        function addCorp() {
            let n = prompt("Название компании:");
            if(n) { corps.push({n}); sync(); }
        }

        function send(target) {
            let a = prompt(`Сколько отправить для ${target}?`);
            if(a && score >= parseInt(a)) {
                score -= parseInt(a);
                logs.push({to: target, type: 'ПЕРЕВОД', v: -parseInt(a)});
                sync();
            } else { alert("ОШИБКА: Мало юнитов"); }
        }

        sync();
    </script>
</body>
</html>
