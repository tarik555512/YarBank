<style>
    .insight-card {
        padding: 15px;
        margin-bottom: 25px;
        position: relative;
        overflow: hidden;
    }
    .insight-header {
        font-size: 0.5rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--accent);
        letter-spacing: 2px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
    }
    .insight-text {
        font-size: 0.75rem;
        line-height: 1.4;
        font-weight: 400;
        opacity: 0.8;
    }
    .market-mini {
        display: flex;
        justify-content: space-between;
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(255,255,255,0.05);
        font-family: 'JetBrains Mono';
        font-size: 0.6rem;
    }
    .market-mini span { opacity: 0.6; }
    .market-mini b { color: var(--accent); font-weight: 500; }
</style>

<div class="aero insight-card">
    <div class="insight-header">
        <span style="margin-right:8px">💡</span> AERO INSIGHT
    </div>
    <div class="insight-text" id="fact-text">
        Загрузка анализа данных...
    </div>
    <div class="market-mini">
        <span>USD/RUB <b id="rate-usd">0.00</b></span>
        <span>BTC/USD <b id="rate-btc">0.00</b></span>
        <span>AERO/COIN <b style="color:#7000ff">1.04</b></span>
    </div>
</div>

<script>
    // 1. Добавь массив фактов в начало скрипта
    const aeroFacts = [
        "90% мировых денег существуют только на серверах в цифровом виде.",
        "Первый банкомат был установлен в Лондоне в 1967 году.",
        "Инвестиция в знания всегда приносит самые высокие проценты.",
        "Слово 'банк' происходит от итальянского 'banco' (скамья).",
        "Самая тяжелая монета в мире весила более одной тонны.",
        "Биткоин-пицца: в 2010 году 2 пиццы купили за 10,000 BTC."
    ];

    // 2. Обнови функцию init(), чтобы она вызывала новые данные
    function init() {
        updateBalanceDisplay(true);
        renderContacts();
        renderHistory();
        updateInsights(); // Добавляем вызов инсайтов
    }

    // 3. Добавь саму функцию обновления инсайтов
    function updateInsights() {
        // Случайный факт
        const randomFact = aeroFacts[Math.floor(Math.random() * aeroFacts.length)];
        document.getElementById('fact-text').innerText = randomFact;

        // Имитация живых курсов
        document.getElementById('rate-usd').innerText = (90 + Math.random() * 5).toFixed(2);
        document.getElementById('rate-btc').innerText = (64000 + Math.random() * 1000).toLocaleString();
    }
</script>
