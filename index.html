<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YarBank Ultra Aero v11</title>
    <style>
        :root {
            --bg: #020205;
            --cyan: #00f2ff;
            --purple: #bc47ff;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --grad: linear-gradient(135deg, var(--cyan), var(--purple));
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.1; animation: float 15s infinite alternate; }
        .orb-1 { background: var(--cyan); top: -150px; left: -100px; }
        .orb-2 { background: var(--purple); bottom: -150px; right: -100px; animation-delay: -7s; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(50px, 40px); } }

        /* ВХОД */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.7s; }
        .login-box { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 45px; padding: 40px; width: 85%; max-width: 340px; text-align: center; }
        .pin-dots { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--text-dim); transition: 0.3s; }
        .dot.active { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 15px var(--cyan); transform: scale(1.2); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .key { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; height: 65px; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .key:active { background: var(--cyan); color: #000; transform: scale(0.9); }

        /* ПРИЛОЖЕНИЕ */
        #app { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: 0.5s; }
        header { padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .scroll { flex: 1; overflow-y: auto; padding: 0 20px 120px 20px; scrollbar-width: none; }
        .scroll::-webkit-scrollbar { display: none; }

        .card { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 35px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bal-val { font-size: 42px; font-weight: 800; margin: 10px 0; }

        .btn-act { flex: 1; padding: 18px; border-radius: 22px; border: 1px solid var(--border); background: var(--glass); color: #fff; font-weight: 700; font-size: 11px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-act.cyan { border-color: var(--cyan); color: var(--cyan); }
        .btn-act.purp { border-color: var(--purple); color: var(--purple); }

        .title-row { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin: 25px 0 15px 10px; display: flex; justify-content: space-between; }
        .h-scroll { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .h-scroll::-webkit-scrollbar { display: none; }
        .item { flex: 0 0 75px; text-align: center; cursor: pointer; }
        .ava { width: 65px; height: 65px; border-radius: 25px; background: var(--glass); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 8px; transition: 0.3s; }
        .item:active .ava { transform: scale(1.1); border-color: var(--cyan); }

        .hist-line { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        input, select { width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; color: #fff; margin-bottom: 15px; font-size: 16px; }
        .btn-main { width: 100%; padding: 20px; border-radius: 20px; background: var(--grad); border: none; font-weight: 800; cursor: pointer; color: #000; font-size: 16px; box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); }

        /* ТАБ-БАР */
        .nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; background: rgba(10,10,15,0.9); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .nav-item { opacity: 0.3; text-align: center; font-size: 10px; transition: 0.3s; color: #fff; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--cyan); }
        .nav-item b { font-size: 22px; display: block; margin-bottom: 3px; }

        .status-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(0, 242, 255, 0.1); color: var(--cyan); padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 10px; border: 1px solid rgba(0, 242, 255, 0.2); }

        .page { display: none; animation: pageUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes pageUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="orb orb-1"></div><div class="orb orb-2"></div>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="margin:0; font-weight: 200; letter-spacing: 5px;">YAR<span style="color:var(--cyan); font-weight: 900;">BANK</span></h1>
            <div class="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="numpad">
                <div class="key" onclick="tap('1')">1</div><div class="key" onclick="tap('2')">2</div><div class="key" onclick="tap('3')">3</div>
                <div class="key" onclick="tap('4')">4</div><div class="key" onclick="tap('5')">5</div><div class="key" onclick="tap('6')">6</div>
                <div class="key" onclick="tap('7')">7</div><div class="key" onclick="tap('8')">8</div><div class="key" onclick="tap('9')">9</div>
                <div class="key" style="opacity:0"></div><div class="key" onclick="tap('0')">0</div><div class="key" onclick="tap('back')">✕</div>
            </div>
        </div>
    </div>

    <div id="app">
        <header>
            <div onclick="go('profile', 'p-tab', 'Профиль')" style="cursor:pointer">
                <div id="date" style="font-size: 10px; color: var(--text-dim);">ЗАГРУЗКА...</div>
                <div id="u-name" style="font-weight: 800; font-size: 22px;">Ярослав</div>
            </div>
            <div id="u-ava" onclick="go('profile', 'p-tab', 'Профиль')" style="width:48px; height:48px; border-radius:18px; background: var(--grad); display:flex; align-items:center; justify-content:center; color:#000; font-weight:900; cursor:pointer">ЯР</div>
        </header>

        <div class="scroll">
            <div id="pg-home" class="page active">
                <div class="card">
                    <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">ВАШ БАЛАНС</div>
                    <div class="bal-val" id="bal">0 ₽</div>
                    <div class="status-badge">● Пользователь банка <span style="margin-left:3px">✓</span></div>
                </div>

                <div style="display:flex; gap:12px; margin-bottom:30px;">
                    <button class="btn-act cyan" onclick="topUp()">📥 Пополнить</button>
                    <button class="btn-act purp" onclick="go('credit', 'c-tab', 'Кредиты')">💸 Кредит</button>
                </div>

                <div class="title-row"><span>Компании</span></div>
                <div class="h-scroll" id="list-comp"></div>

                <div class="title-row"><span>Контакты</span></div>
                <div class="h-scroll" id="list-cont"></div>

                <div class="title-row"><span>История</span></div>
                <div class="card" style="padding:15px;" id="hist"></div>
            </div>

            <div id="pg-profile" class="page">
                <div class="card" style="text-align:center">
                    <div style="width:90px; height:90px; border-radius:35px; background:var(--grad); margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:36px; color:#000; font-weight:900" id="prof-ava">ЯР</div>
                    <h2 id="prof-name" style="margin:0">Ярослав</h2>
                    <div class="status-badge" style="margin-bottom:20px">Пользователь банка ✓</div>
                    
                    <input type="text" id="edit-n" placeholder="Новое имя">
                    <button class="btn-main" onclick="saveName()">ОБНОВИТЬ ПРОФИЛЬ</button>
                    <button onclick="resetAll()" style="background:transparent; border:none; color:#ff4a4a; margin-top:20px; font-size:12px; font-weight:bold; cursor:pointer">СБРОСИТЬ ДАННЫЕ</button>
                </div>
            </div>

            <div id="pg-credit" class="page">
                <div class="card">
                    <h2 style="margin-top:0">Кредитование</h2>
                    <input type="text" id="loan-goal" placeholder="Цель кредита">
                    <input type="number" id="loan-sum" placeholder="Сумма ₽">
                    <button class="btn-main" onclick="getLoan()">ПОДТВЕРДИТЬ ВЫПЛАТУ</button>
                </div>
            </div>

            <div id="pg-add" class="page">
                <div class="card">
                    <h2 style="margin-top:0">Добавить объект</h2>
                    <select id="add-type">
                        <option value="cont">Личный контакт</option>
                        <option value="comp">Компания / Бизнес</option>
                    </select>
                    <input type="text" id="add-name" placeholder="Название или Имя">
                    <button class="btn-main" onclick="addNew()">ЗАРЕГИСТРИРОВАТЬ</button>
                </div>
            </div>
        </div>

        <nav class="nav">
            <div class="nav-item active" onclick="go('home', this)"><b>🏠</b>ГЛАВНАЯ</div>
            <div id="c-tab" class="nav-item" onclick="go('credit', this)"><b>💸</b>КРЕДИТ</div>
            <div class="nav-item" onclick="go('add', this)"><b>➕</b>ДОБАВИТЬ</div>
            <div id="p-tab" class="nav-item" onclick="go('profile', this)"><b>👤</b>ПРОФИЛЬ</div>
        </nav>
    </div>

    <script>
        const PINS = ["2026", "2807", "2907", "3008"];
        let curPin = "";
        
        let storage = JSON.parse(localStorage.getItem('yar_elite_v11')) || {
            u: "Ярослав",
            b: 0,
            h: [],
            contacts: [],
            companies: []
        };

        function save() {
            localStorage.setItem('yar_elite_v11', JSON.stringify(storage));
            sync();
        }

        function tap(k) {
            if (k === 'back') curPin = curPin.slice(0, -1);
            else if (curPin.length < 4) curPin += k;
            
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < curPin.length));

            if (curPin.length === 4) {
                if (PINS.includes(curPin)) {
                    document.getElementById('login-screen').style.transform = 'translateY(-100%)';
                    setTimeout(() => {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        setTimeout(() => document.getElementById('app').style.opacity = '1', 50);
                    }, 500);
                } else {
                    curPin = "";
                    setTimeout(() => dots.forEach(d => d.classList.remove('active')), 200);
                }
            }
        }

        function go(id, el, title) {
            document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + id).classList.add('active');
            if(typeof el === 'string') document.getElementById(el).classList.add('active');
            else el.classList.add('active');
        }

        function sync() {
            document.getElementById('bal').innerText = storage.b.toLocaleString() + " ₽";
            document.getElementById('u-name').innerText = storage.u;
            document.getElementById('prof-name').innerText = storage.u;
            const ini = storage.u.substring(0, 2).toUpperCase();
            document.getElementById('u-ava').innerText = ini;
            document.getElementById('prof-ava').innerText = ini;

            const hBox = document.getElementById('hist');
            hBox.innerHTML = storage.h.length ? '' : '<div style="text-align:center; opacity:0.2;">Нет операций</div>';
            storage.h.slice().reverse().forEach(l => {
                hBox.insertAdjacentHTML('beforeend', `<div class="hist-line"><span>${l.t}</span><b style="color:${l.p ? '#00ffaa' : '#ff4a4a'}">${l.p?'+':'-'}${l.a.toLocaleString()} ₽</b></div>`);
            });

            const compBox = document.getElementById('list-comp');
            const contBox = document.getElementById('list-cont');
            compBox.innerHTML = storage.companies.length ? '' : '<div style="font-size:10px; opacity:0.2; padding:10px;">Нет компаний</div>';
            contBox.innerHTML = storage.contacts.length ? '' : '<div style="font-size:10px; opacity:0.2; padding:10px;">Нет контактов</div>';

            storage.companies.forEach(n => compBox.insertAdjacentHTML('beforeend', `<div class="item" onclick="pay('${n}', true)"><div class="ava">🏢</div><div style="font-size:10px; opacity:0.5;">${n}</div></div>`));
            storage.contacts.forEach(n => contBox.insertAdjacentHTML('beforeend', `<div class="item" onclick="pay('${n}', false)"><div class="ava">👤</div><div style="font-size:10px; opacity:0.5;">${n}</div></div>`));
        }

        function topUp() {
            const f = prompt("От кого?");
            const a = parseInt(prompt("Сумма ₽:"));
            if(a > 0) {
                storage.b += a;
                storage.h.push({t: `Пополнение: ${f || 'Банк'}`, a, p: true});
                save();
            }
        }

        function saveName() {
            const n = document.getElementById('edit-n').value;
            if(n) { storage.u = n; save(); alert("Профиль обновлен!"); go('home', document.querySelector('.nav-item')); }
        }

        function getLoan() {
            const a = parseInt(document.getElementById('loan-sum').value);
            const g = document.getElementById('loan-goal').value;
            if(a > 0) {
                storage.b += a;
                storage.h.push({t: `Кредит: ${g || 'Личный'}`, a, p: true});
                document.getElementById('loan-sum').value = '';
                save(); go('home', document.querySelector('.nav-item'));
            }
        }

        function addNew() {
            const n = document.getElementById('add-name').value;
            const t = document.getElementById('add-type').value;
            if(!n) return;
            if(t === 'comp') storage.companies.push(n); else storage.contacts.push(n);
            document.getElementById('add-name').value = '';
            save(); go('home', document.querySelector('.nav-item'));
        }

        function pay(target, isComp) {
            const a = parseInt(prompt(`Сумма для ${target} (₽):`));
            if(a > storage.b) return alert("Недостаточно средств!");
            if(a > 0) {
                storage.b -= a;
                storage.h.push({t: `${isComp ? 'Оплата:' : 'Перевод:'} ${target}`, a, p: false});
                save();
            }
        }

        function resetAll() { if(confirm("Удалить всё?")) { localStorage.removeItem('yar_elite_v11'); location.reload(); } }

        document.getElementById('date').innerText = new Date().toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'}).toUpperCase();
        sync();
    </script>
</body>
</html>
