<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YarBank Mobile Aero Final</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-blue: #00f2ff;
            --neon-purple: #9d50ff;
            --bg-dark: #0a0a12;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --error: #ff4a4a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 200vw; height: 200vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.04) 0%, rgba(157, 80, 255, 0.04) 30%, transparent 70%);
            top: -50vw; left: -50vw;
            z-index: -1;
            animation: rotate 25s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ЭКРАН ВХОДА */
        #login-screen {
            position: fixed; inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 20px;
            width: 100%; max-width: 320px;
            text-align: center;
        }
        .pin-dots { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--neon-blue); }
        .dot.active { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        /* ПРИЛОЖЕНИЕ */
        #app-content { display: none; flex-direction: column; height: 100vh; padding-bottom: 80px; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-scroll { flex: 1; overflow-y: auto; padding: 0 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px; margin-bottom: 15px;
        }

        .balance-val { font-size: 34px; font-weight: 700; margin: 10px 0; letter-spacing: -1px; }

        h2 { font-size: 16px; font-weight: 500; margin: 0 0 15px 0; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; }

        /* КОНТАКТЫ НА ГЛАВНОЙ */
        .horizontal-contacts {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .horizontal-contacts::-webkit-scrollbar { display: none; }
        
        .contact-circle {
            flex: 0 0 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .avatar {
            width: 55px; height: 55px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--neon-purple);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: 0.2s;
        }
        .contact-circle:active .avatar { transform: scale(0.9); border-color: var(--neon-blue); }
        .contact-name { font-size: 10px; color: var(--text-muted); text-align: center; white-space: nowrap; overflow: hidden; width: 100%; }

        /* ИСТОРИЯ */
        .list-item {
            display: flex; justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .neg { color: var(--error); }
        .pos { color: #00ffaa; }

        /* ФОРМЫ */
        input, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px; color: #fff; font-size: 16px;
            margin-bottom: 10px; outline: none;
        }
        button {
            width: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            border: none; padding: 15px; border-radius: 12px;
            color: #000; font-weight: bold; font-size: 16px;
            cursor: pointer;
        }

        /* ТАБ-БАР */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; opacity: 0.5; color: #fff; cursor: pointer; }
        .tab-item.active { opacity: 1; color: var(--neon-blue); }

        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin:0; font-weight: 300;">YAR<span style="color:var(--neon-blue)">BANK</span></h1>
            <div class="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <input type="password" id="pin-input" pattern="\d*" inputmode="numeric" maxlength="4" style="opacity:0; position:absolute;">
        </div>
    </div>

    <div id="app-content">
        <header>
            <span style="font-weight: bold; font-size: 18px;" id="page-title">YarBank</span>
            <div style="width:35px; height:35px; border-radius:50%; background: var(--glass); border: 1px solid var(--neon-blue); display:flex; align-items:center; justify-content:center;">ЯР</div>
        </header>

        <div class="main-scroll">
            <div id="page-home" class="page-section active">
                <div class="card">
                    <div style="font-size: 13px; opacity: 0.5;">Ваш баланс</div>
                    <div class="balance-val" id="balance">0 ₽</div>
                </div>

                <h2>Быстрый перевод</h2>
                <div class="horizontal-contacts" id="quick-contacts">
                    </div>

                <div class="card" style="margin-top: 15px;">
                    <h2>Операции</h2>
                    <div id="hist-list" style="max-height: 300px; overflow-y: auto;">
                        <div style="text-align: center; opacity: 0.3; padding: 20px;">Нет транзакций</div>
                    </div>
                </div>
            </div>

            <div id="page-credit" class="page-section">
                <div class="card">
                    <h2>Кредитный отдел</h2>
                    <div id="c-step-1">
                        <select id="c-goal-select">
                            <option value="" disabled selected>Выберите цель...</option>
                            <option value="R&D">R&D Исследования</option>
                            <option value="Оборудование">Оборудование</option>
                            <option value="Лицензии">Лицензии</option>
                            <option value="Маркетинг">Маркетинг</option>
                        </select>
                        <button onclick="nextC(2)">Далее</button>
                    </div>
                    <div id="c-step-2" style="display:none;">
                        <input type="text" id="c-name" placeholder="Название проекта">
                        <button onclick="nextC(3)">Далее</button>
                    </div>
                    <div id="c-step-3" style="display:none;">
                        <input type="number" id="c-amt" placeholder="Сумма ₽">
                        <button onclick="applyCredit()">Подтвердить</button>
                    </div>
                </div>
            </div>

            <div id="page-corp" class="page-section">
                <div class="card">
                    <h2>Добавить контакт/отдел</h2>
                    <input type="text" id="new-name" placeholder="Напр: Алексей Д.">
                    <button onclick="addItem()">+ Добавить в YarCorp</button>
                </div>
                <div class="card">
                    <p style="font-size: 11px; opacity: 0.4; text-align: center;">ПИН-коды: 2026, 2807, 2907, 3008</p>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="nav('home', this, 'YarBank')"><span>🏠</span><span>Главная</span></div>
            <div class="tab-item" onclick="nav('credit', this, 'Кредиты')"><span>💸</span><span>Кредиты</span></div>
            <div class="tab-item" onclick="nav('corp', this, 'Управление')"><span>⚙️</span><span>Настройка</span></div>
        </nav>
    </div>

    <script>
        const PINS = ["2026", "2807", "2907", "3008"];
        let balance = 0;

        // ПИН-код
        const pinIn = document.getElementById('pin-input');
        const dots = document.querySelectorAll('.dot');
        document.getElementById('login-screen').onclick = () => pinIn.focus();
        pinIn.oninput = (e) => {
            const v = e.target.value;
            dots.forEach((d, i) => i < v.length ? d.classList.add('active') : d.classList.remove('active'));
            if(v.length === 4) {
                if(PINS.includes(v)) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-content').style.display = 'flex';
                } else { pinIn.value = ''; dots.forEach(d => d.classList.remove('active')); }
            }
        };

        function nav(id, el, title) {
            document.querySelectorAll('.page-section, .tab-item').forEach(x => x.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.getElementById('page-title').innerText = title;
            el.classList.add('active');
        }

        function updateUI(amt, desc, isPos) {
            balance += isPos ? amt : -amt;
            document.getElementById('balance').innerText = balance.toLocaleString() + " ₽";
            const list = document.getElementById('hist-list');
            if(list.innerText.includes("Нет транзакций")) list.innerHTML = '';
            const item = `<div class="list-item"><span>${desc}</span><span class="${isPos ? 'pos' : 'neg'}">${isPos ? '+' : '-'}${amt.toLocaleString()} ₽</span></div>`;
            list.insertAdjacentHTML('afterbegin', item);
        }

        // КОРПОРАЦИЯ И КОНТАКТЫ
        function addItem() {
            const name = document.getElementById('new-name').value;
            if(!name) return;
            
            // Добавляем в горизонтальный список на главной
            const initial = name.charAt(0).toUpperCase();
            const html = `
                <div class="contact-circle" onclick="sendMoneyTo('${name}')">
                    <div class="avatar">${initial}</div>
                    <div class="contact-name">${name}</div>
                </div>`;
            document.getElementById('quick-contacts').insertAdjacentHTML('beforeend', html);
            document.getElementById('new-name').value = '';
            
            alert(`${name} добавлен на главную страницу!`);
            nav('home', document.querySelectorAll('.tab-item')[0], 'YarBank');
        }

        function sendMoneyTo(target) {
            const amt = prompt(`Сумма перевода для "${target}":`);
            const num = parseInt(amt);
            if(isNaN(num) || num <= 0) return;
            if(num > balance) return alert("Недостаточно средств!");
            
            updateUI(num, `Перевод: ${target}`, false);
        }

        // КРЕДИТ
        function nextC(s) {
            document.getElementById('c-step-1').style.display = 'none';
            document.getElementById('c-step-2').style.display = 'none';
            document.getElementById('c-step-3').style.display = 'none';
            document.getElementById('c-step-' + s).style.display = 'block';
        }

        function applyCredit() {
            const a = parseInt(document.getElementById('c-amt').value);
            const n = document.getElementById('c-name').value;
            const g = document.getElementById('c-goal-select').value;
            if(!a) return;
            updateUI(a, `Кредит (${g}): ${n}`, true);
            document.getElementById('c-amt').value = '';
            document.getElementById('c-name').value = '';
            nextC(1);
            nav('home', document.querySelectorAll('.tab-item')[0], 'YarBank');
        }
    </script>
</body>
</html>
