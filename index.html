<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YarBank Hyper Aero v10</title>
    <style>
        :root {
            --bg-deep: #020205;
            --accent-cyan: #00f2ff;
            --accent-purple: #bc47ff;
            --glass-card: rgba(255, 255, 255, 0.04);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.4);
            --neon-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: var(--bg-deep); color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Фоновое свечение */
        .bg-blur {
            position: fixed; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(188, 71, 255, 0.1) 0%, transparent 40%);
        }

        /* ЛОГИН (Улучшенный) */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 5000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .login-box {
            background: var(--glass-card); backdrop-filter: blur(50px);
            border: 1px solid var(--border-light); border-radius: 45px;
            padding: 40px; width: 85%; max-width: 340px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .pin-container { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--text-secondary); transition: 0.3s; }
        .pin-dot.fill { background: var(--accent-cyan); border-color: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan); transform: scale(1.2); }
        
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .n-key {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-light);
            border-radius: 20px; height: 65px; font-size: 26px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .n-key:active { background: var(--accent-cyan); color: #000; transform: scale(0.9); }

        /* ПРИЛОЖЕНИЕ */
        #app-main { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: 0.5s ease-out; }
        
        header { padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 0 20px 120px 20px; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .balance-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(30px); border: 1px solid var(--border-light);
            border-radius: 35px; padding: 25px; margin-bottom: 25px; box-shadow: var(--neon-shadow);
        }
        .bal-val { font-size: 42px; font-weight: 800; margin: 10px 0; letter-spacing: -1px; }

        .btn-row { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-action {
            flex: 1; padding: 18px; border-radius: 22px; border: 1px solid var(--border-light);
            background: var(--glass-card); color: #fff; font-weight: 700; font-size: 11px;
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-action.plus { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-action.loan { border-color: var(--accent-purple); color: var(--accent-purple); }

        .section-title { font-size: 12px; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; margin: 25px 0 15px 10px; }
        
        .list-row { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; }
        .list-item { flex: 0 0 75px; text-align: center; }
        .ava-box {
            width: 65px; height: 65px; border-radius: 25px; background: var(--glass-card);
            border: 1px solid var(--border-light); display: flex; align-items: center;
            justify-content: center; font-size: 24px; margin-bottom: 10px; transition: 0.3s;
        }
        .list-item:active .ava-box { transform: scale(1.1); border-color: var(--accent-cyan); }

        /* ИСТОРИЯ */
        .hist-card { background: rgba(255,255,255,0.02); border-radius: 30px; padding: 20px; border: 1px solid var(--border-light); }
        .hist-line { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        /* ТАБ-БАР */
        .nav-bar {
            position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px;
            background: rgba(10,10,15,0.9); backdrop-filter: blur(30px);
            border: 1px solid var(--border-light); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center; z-index: 4000;
        }
        .nav-link { opacity: 0.3; text-align: center; font-size: 10px; transition: 0.3s; color: #fff; text-decoration: none; cursor: pointer; }
        .nav-link.active { opacity: 1; color: var(--accent-cyan); }
        .nav-link b { font-size: 22px; display: block; margin-bottom: 3px; }

        /* ПРОФИЛЬ */
        .prof-top { text-align: center; margin-bottom: 30px; }
        .prof-ava { width: 100px; height: 100px; border-radius: 40px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; font-size: 40px; color: #000; font-weight: 900; box-shadow: 0 15px 40px rgba(188, 71, 255, 0.4); }
        
        input, select { width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-light); border-radius: 20px; color: #fff; margin-bottom: 15px; font-size: 16px; }
        .btn-submit { width: 100%; padding: 20px; border-radius: 20px; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); border: none; font-weight: 800; cursor: pointer; color: #000; font-size: 16px; }

        .view-page { display: none; animation: pageUp 0.5s ease; }
        .view-page.active { display: block; }
        @keyframes pageUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="margin:0; font-weight: 200; letter-spacing: 6px;">YAR<span style="color:var(--accent-cyan); font-weight: 900;">BANK</span></h1>
            <div class="pin-container"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
            <div class="numpad-grid">
                <div class="n-key" onclick="tapKey('1')">1</div><div class="n-key" onclick="tapKey('2')">2</div><div class="n-key" onclick="tapKey('3')">3</div>
                <div class="n-key" onclick="tapKey('4')">4</div><div class="n-key" onclick="tapKey('5')">5</div><div class="n-key" onclick="tapKey('6')">6</div>
                <div class="n-key" onclick="tapKey('7')">7</div><div class="n-key" onclick="tapKey('8')">8</div><div class="n-key" onclick="tapKey('9')">9</div>
                <div class="n-key" style="border:none; background:transparent;"></div><div class="n-key" onclick="tapKey('0')">0</div><div class="n-key" onclick="tapKey('back')">✕</div>
            </div>
        </div>
    </div>

    <div id="app-main">
        <header>
            <div onclick="goPage('profile', document.getElementById('lnk-p'), 'Мой Профиль')" style="cursor: pointer;">
                <div id="top-date" style="font-size: 10px; color: var(--text-secondary); letter-spacing: 1px;">9 МАРТА</div>
                <div id="top-name" style="font-weight: 800; font-size: 24px;">Привет, Ярослав!</div>
            </div>
            <div id="top-ava" onclick="goPage('profile', document.getElementById('lnk-p'), 'Мой Профиль')" style="width:50px; height:50px; border-radius:18px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); display:flex; align-items:center; justify-content:center; color: #000; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);">ЯР</div>
        </header>

        <div class="scroll-area">
            <div id="pg-home" class="view-page active">
                <div class="balance-card">
                    <div style="font-size: 11px; color: var(--text-secondary); letter-spacing: 2px;">ВАШ СЧЁТ</div>
                    <div class="bal-val" id="bal-text">0 ₽</div>
                    <div style="font-size: 12px; color: #00ffaa; display: flex; align-items: center; gap: 5px;">
                        <span style="width: 6px; height: 6px; background: #00ffaa; border-radius: 50%;"></span>
                        Система YarBank Активна
                    </div>
                </div>

                <div class="btn-row">
                    <button class="btn-action plus" onclick="addMoney()">📥 Пополнить</button>
                    <button class="btn-action loan" onclick="goPage('credit', document.getElementById('lnk-c'), 'Кредитный отдел')">💸 Кредит</button>
                </div>

                <div class="section-title">Отделы Корпорации</div>
                <div class="list-row" id="row-depts"></div>

                <div class="section-title">Контакты</div>
                <div class="list-row" id="row-contacts"></div>

                <div class="section-title">История операций</div>
                <div class="hist-card" id="hist-container"></div>
            </div>

            <div id="pg-profile" class="view-page">
                <div class="balance-card">
                    <div class="prof-top">
                        <div class="prof-ava" id="big-ava">ЯР</div>
                        <h3 id="big-name" style="margin:0; font-size: 24px;">Ярослав</h3>
                        <p style="font-size: 12px; color: var(--text-secondary);">Уровень доступа: Администратор</p>
                    </div>
                    <label style="font-size: 11px; color: var(--text-secondary); margin-left: 5px;">ИЗМЕНИТЬ ИМЯ</label>
                    <input type="text" id="in-name" placeholder="Как вас называть?">
                    <button class="btn-submit" onclick="updateUser()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                    <button onclick="hardReset()" style="margin-top: 30px; background: transparent; border: 1px solid rgba(255,0,0,0.3); color: #ff4a4a; width: 100%; padding: 15px; border-radius: 15px; font-size: 12px; font-weight: bold;">СБРОСИТЬ ВСЁ</button>
                </div>
            </div>

            <div id="pg-credit" class="view-page">
                <div class="balance-card">
                    <h2 style="margin-top:0;">Получить кредит</h2>
                    <input type="text" id="cr-reason" placeholder="На какие цели?">
                    <input type="number" id="cr-sum" placeholder="Сумма кредита (₽)">
                    <button class="btn-submit" onclick="takeCredit()">ПОДТВЕРДИТЬ ВЫПЛАТУ</button>
                </div>
            </div>

            <div id="pg-add" class="view-page">
                <div class="balance-card">
                    <h2 style="margin-top:0;">Добавить в систему</h2>
                    <select id="add-cat">
                        <option value="contact">Личный контакт</option>
                        <option value="dept">Рабочий отдел</option>
                    </select>
                    <input type="text" id="add-name" placeholder="Имя или Название">
                    <button class="btn-submit" onclick="pushItem()">ДОБАВИТЬ НА ГЛАВНУЮ</button>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-link active" onclick="goPage('home', this, 'YarBank')"><b>🏠</b>ГЛАВНАЯ</div>
            <div id="lnk-c" class="nav-link" onclick="goPage('credit', this, 'Кредиты')"><b>💸</b>КРЕДИТ</div>
            <div class="nav-link" onclick="goPage('add', this, 'Добавить')"><b>➕</b>ОБЪЕКТ</div>
            <div id="lnk-p" class="nav-link" onclick="goPage('profile', this, 'Профиль')"><b>👤</b>ПРОФИЛЬ</div>
        </nav>
    </div>

    <script>
        const CODES = ["2026", "2807", "2907", "3008"];
        let pin = "";
        
        // --- ДАННЫЕ (LocalStorage) ---
        let db = JSON.parse(localStorage.getItem('yar_bank_v10')) || {
            user: "Ярослав",
            val: 0,
            log: [],
            clist: [],
            dlist: []
        };

        function save() {
            localStorage.setItem('yar_bank_v10', JSON.stringify(db));
            sync();
        }

        // --- ЛОГИН ---
        function tapKey(k) {
            if (k === 'back') pin = pin.slice(0, -1);
            else if (pin.length < 4) pin += k;
            
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('fill', i < pin.length));

            if (pin.length === 4) {
                if (CODES.includes(pin)) {
                    const scr = document.getElementById('login-screen');
                    scr.style.transform = 'translateY(-100%) scale(1.1)';
                    setTimeout(() => {
                        scr.style.display = 'none';
                        document.getElementById('app-main').style.display = 'flex';
                        setTimeout(() => document.getElementById('app-main').style.opacity = '1', 50);
                    }, 600);
                } else {
                    pin = "";
                    setTimeout(() => dots.forEach(d => d.classList.remove('fill')), 200);
                }
            }
        }

        // --- НАВИГАЦИЯ ---
        function goPage(id, el, title) {
            document.querySelectorAll('.view-page, .nav-link').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + id).classList.add('active');
            if(el) el.classList.add('active');
            // Если перешли не в профиль, заголовок меняется
            if(id === 'home') document.getElementById('top-name').innerText = "Привет, " + db.user + "!";
            else document.getElementById('top-name').innerText = title;
        }

        // --- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---
        function sync() {
            document.getElementById('bal-text').innerText = db.val.toLocaleString() + " ₽";
            const initials = db.user.substring(0, 2).toUpperCase();
            document.getElementById('top-ava').innerText = initials;
            document.getElementById('big-ava').innerText = initials;
            document.getElementById('big-name').innerText = db.user;
            document.getElementById('top-name').innerText = "Привет, " + db.user + "!";
            document.getElementById('in-name').value = db.user;

            // Рендер истории
            const hBox = document.getElementById('hist-container');
            hBox.innerHTML = db.log.length ? '' : '<div style="text-align:center; opacity:0.2;">История пуста</div>';
            db.log.slice().reverse().forEach(l => {
                hBox.insertAdjacentHTML('beforeend', `<div class="hist-line"><span>${l.txt}</span><b style="color:${l.is ? '#00ffaa' : '#ff4a4a'}">${l.is?'+':'-'}${l.a.toLocaleString()} ₽</b></div>`);
            });

            // Рендер списков
            const dBox = document.getElementById('row-depts');
            const cBox = document.getElementById('row-contacts');
            dBox.innerHTML = db.dlist.length ? '' : '<div style="font-size:10px; opacity:0.2;">Нет отделов</div>';
            cBox.innerHTML = db.clist.length ? '' : '<div style="font-size:10px; opacity:0.2;">Нет контактов</div>';

            db.dlist.forEach(n => dBox.insertAdjacentHTML('beforeend', `<div class="list-item" onclick="payTo('${n}')"><div class="ava-box">🏢</div><div style="font-size:10px; opacity:0.5;">${n}</div></div>`));
            db.clist.forEach(n => cBox.insertAdjacentHTML('beforeend', `<div class="list-item" onclick="payTo('${n}')"><div class="ava-box">👤</div><div style="font-size:10px; opacity:0.5;">${n}</div></div>`));
        }

        // --- ФУНКЦИИ ---
        function addMoney() {
            const f = prompt("От кого?");
            const a = parseInt(prompt("Сумма (₽):"));
            if(a > 0) {
                db.val += a;
                db.log.push({txt: `От: ${f || 'Внешний счет'}`, a, is: true});
                save();
            }
        }

        function updateUser() {
            const n = document.getElementById('in-name').value;
            if(n) { db.user = n; save(); alert("Имя изменено!"); goPage('home', document.querySelector('.nav-link'), ''); }
        }

        function takeCredit() {
            const a = parseInt(document.getElementById('cr-sum').value);
            const r = document.getElementById('cr-reason').value;
            if(a > 0) {
                db.val += a;
                db.log.push({txt: `Кредит: ${r || 'Без цели'}`, a, is: true});
                document.getElementById('cr-sum').value = ''; document.getElementById('cr-reason').value = '';
                save();
                goPage('home', document.querySelector('.nav-link'), '');
            }
        }

        function pushItem() {
            const n = document.getElementById('add-name').value;
            const c = document.getElementById('add-cat').value;
            if(!n) return;
            if(c === 'dept') db.dlist.push(n); else db.clist.push(n);
            document.getElementById('add-name').value = '';
            save();
            goPage('home', document.querySelector('.nav-link'), '');
        }

        function payTo(target) {
            const a = parseInt(prompt(`Перевод для ${target} (₽):`));
            if(a > db.val) return alert("Недостаточно средств!");
            if(a > 0) {
                db.val -= a;
                db.log.push({txt: `Перевод: ${target}`, a, is: false});
                save();
            }
        }

        function hardReset() {
            if(confirm("Удалить все данные?")) { localStorage.removeItem('yar_bank_v10'); location.reload(); }
        }

        // Запуск
        document.getElementById('top-date').innerText = new Date().toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'}).toUpperCase();
        sync();
    </script>
</body>
</html>
